name: Verify iCloud links

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'Makefile'
      - 'tests/**'
      - '.github/workflows/verify-links.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test
